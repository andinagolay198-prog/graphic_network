version: '3.8'

services:
  # Frontend - React App
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: network-topology-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8000
      REACT_APP_WS_URL: ws://localhost:8000
    depends_on:
      - backend
    networks:
      - topology-network
    restart: unless-stopped

  # Backend - FastAPI Server
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: network-topology-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://topology_user:topology_pass@postgres:5432/network_topology
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: info
    depends_on:
      - postgres
      - redis
    volumes:
      - ./collectors:/app/collectors
      - ./config:/app/config
    networks:
      - topology-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: topology-postgres
    environment:
      POSTGRES_DB: network_topology
      POSTGRES_USER: topology_user
      POSTGRES_PASSWORD: topology_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks:
      - topology-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U topology_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: topology-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - topology-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # InfluxDB - Time Series Database (optional)
  influxdb:
    image: influxdb:2.7-alpine
    container_name: topology-influxdb
    environment:
      INFLUXDB_DB: network_metrics
      INFLUXDB_ADMIN_USER: admin
      INFLUXDB_ADMIN_PASSWORD: admin123
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    networks:
      - topology-network
    restart: unless-stopped

  # Grafana - Metrics Visualization (optional)
  grafana:
    image: grafana/grafana:10.0.0
    container_name: topology-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_INSTALL_PLUGINS: "grafana-piechart-panel"
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - influxdb
    networks:
      - topology-network
    restart: unless-stopped

  # Prometheus - Metrics Collection (optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: topology-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - topology-network
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

volumes:
  postgres_data:
  redis_data:
  influxdb_data:
  grafana_data:
  prometheus_data:

networks:
  topology-network:
    driver: bridge
