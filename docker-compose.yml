services:

  influxdb:
    image: influxdb:2.7-alpine
    container_name: plnet-influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE:        setup
      DOCKER_INFLUXDB_INIT_USERNAME:    admin
      DOCKER_INFLUXDB_INIT_PASSWORD:    Admin@plnet2024
      DOCKER_INFLUXDB_INIT_ORG:         plnetwork
      DOCKER_INFLUXDB_INIT_BUCKET:      metrics
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: plnetwork-influx-token-2024
    volumes:
      - influxdb_data:/var/lib/influxdb2
    networks:
      - plnet
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15-alpine
    container_name: plnet-postgres
    environment:
      POSTGRES_DB:       network_topology
      POSTGRES_USER:     topology_user
      POSTGRES_PASSWORD: topology_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - plnet
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U topology_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: plnet-redis
    volumes:
      - redis_data:/data
    networks:
      - plnet
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  plnetwork-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: plnet-backend
    volumes:
      - ./backend:/app
    ports:
      - "8001:8001"
    environment:
      INFLUX_URL:    http://influxdb:8086
      INFLUX_TOKEN:  plnetwork-influx-token-2024
      INFLUX_ORG:    plnetwork
      INFLUX_BUCKET: metrics
    depends_on:
      influxdb:
        condition: service_healthy
    networks:
      - plnet
    restart: unless-stopped

  plnetwork-ui:
    image: node:20-alpine
    container_name: plnet-ui
    working_dir: /app
    entrypoint: ["/bin/sh", "-c", "npm install && npm run dev -- --host 0.0.0.0 --port 5173"]
    volumes:
      - ./netauto-ui:/app
    ports:
      - "5173:5173"
    depends_on:
      - plnetwork-backend
    networks:
      - plnet
    restart: unless-stopped

volumes:
  influxdb_data:
  postgres_data:
  redis_data:

networks:
  plnet:
    driver: bridge
